name: Render a CV
on:
  push:
    branches:
      - main
      - master
    paths:
      - "_data/cv.yml"
      - "_data/cv.yaml"
  workflow_call:
  workflow_dispatch:
permissions:
  contents: write
jobs:
  rendercv:
    name: RenderCV
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install RenderCV
        run: |
          pip install -r requirements.txt
      - name: RenderCV
        run: |
          cv_file=$(find _data -maxdepth 1 -type f \( -name "cv.yaml" -o -name "cv.yml" \))
          if [ -z "$cv_file" ]; then
            echo "No cv.yml or cv.yaml file found!"
            exit 1
          fi
          # Ensure assets/pdf exists
          mkdir -p assets/pdf
          rendercv render $cv_file
      - name: Cleanup and Push changes
        run: |
          # Remove temporary build artifacts
          rm -rf _data/rendercv_output

          git config --global user.name "${{ github.actor }}"
          git config --global user.email "${{ github.actor }}@users.noreply.github.com"
          git add assets/pdf/cv.pdf
          if git diff --staged --quiet; then
            echo "No changes to CV PDF. Skipping commit."
          else
            git commit -m "chore: render the latest CV"
            git push
          fi
